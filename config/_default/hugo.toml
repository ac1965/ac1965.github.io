# -- Site Configuration --
# https://blowfish.page/docs/getting-started/
# https://gohugo.io/configuration/all/

# NOTE: Remove 'theme' when using Hugo Modules (go.mod). Keep for git submodule installs.
theme                  = "blowfish"
baseURL                = "https://www.ty07.net/"
defaultContentLanguage = "en"

enableRobotsTXT        = true
summaryLength          = 0

buildDrafts            = false
buildFuture            = false

# googleAnalytics = "G-XXXXXXXXX"

[pagination]
  pagerSize = 10

[imaging]
  anchor = "Center"

[taxonomies]
  tag      = "tags"
  category = "categories"
  author   = "authors"
  series   = "series"

[sitemap]
  changefreq = "daily"
  filename   = "sitemap.xml"
  priority   = 0.5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[related]
  threshold = 0
  toLower   = false

  [[related.indices]]
    name   = "tags"
    weight = 100

  [[related.indices]]
    name   = "categories"
    weight = 100

  [[related.indices]]
    name   = "series"
    weight = 50

  [[related.indices]]
    name   = "authors"
    weight = 20

  [[related.indices]]
    name   = "date"
    weight = 10

  [[related.indices]]
    name        = "fragmentrefs"
    type        = "fragments"
    applyFilter = false
    weight      = 10

[services]
  [services.disqus]
    shortname = "https-www-ty07-net"
