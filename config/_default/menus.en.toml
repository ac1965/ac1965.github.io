# -- Menu Configuration --
# https://blowfish.page/docs/configuration/#menus
# https://gohugo.io/configuration/menus/
#
# Acceptable parameters: name, pageRef, page, url, title, weight, identifier, parent
# Menus are ordered alphabetically by default; override with 'weight' (lowest first).

# -------------------------
# Main Menu (header)
# -------------------------

[[main]]
  name    = "Posts"
  pageRef = "post"
  weight  = 10

[[main]]
  name    = "About"
  pageRef = "about"
  weight  = 20

# Sub-menu example:
# [[main]]
#   name   = "Parent"
#   weight = 30
#
# [[main]]
#   name   = "Child Item"
#   parent = "Parent"
#   pageRef = "posts"
#   weight  = 10

# -------------------------
# Footer Menu
# -------------------------

[[footer]]
  name    = "Tags"
  pageRef = "tags"
  weight  = 10

[[footer]]
  name    = "Categories"
  pageRef = "categories"
  weight  = 20
