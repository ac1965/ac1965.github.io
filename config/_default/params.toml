# -- Theme Parameters --
# https://blowfish.page/docs/configuration/#theme-parameters

colorScheme           = "congo"   # Options: blowfish, avocado, ocean, fire, slate, nuclear, bamboo, sawdust, goldfish, terminal, congo
defaultAppearance     = "light"   # Options: light, dark
autoSwitchAppearance  = true

enableSearch          = true
enableCodeCopy        = true

# mainSections = ["section1", "section2"]
# robots = ""

disableImageOptimization   = false
disableTextInHeader        = false

# defaultBackgroundImage = "IMAGE.jpg"
# defaultFeaturedImage   = "IMAGE.jpg"

smartTOC                      = true
smartTOCHideUnfocusedChildren = true

# -------------------------
# Header
# -------------------------
[header]
  layout = "fixed-gradient"   # Options: basic, fixed, fixed-fill, fixed-gradient, fixed-fill-blur

# -------------------------
# Footer
# -------------------------
[footer]
  showMenu              = true
  showCopyright         = true
  showThemeAttribution  = true
  showAppearanceSwitcher = true
  showScrollToTop       = true

# -------------------------
# Homepage
# -------------------------
[homepage]
  layout              = "custom"   # Options: page, profile, hero, card, background, custom
  # homepageImage     = "Tokyo-station.jpg"
  showRecent          = true
  showRecentItems     = 6
  showMoreLink        = true
  showMoreLinkDest    = "/post"
  cardView            = true
  cardViewScreenWidth = false
  layoutBackgroundBlur = false

# -------------------------
# Article
# -------------------------
[article]
  showDate                = true
  showViews               = false
  showLikes               = false
  showDateOnlyInArticle   = false
  showDateUpdated         = false
  showAuthor              = true
  showAuthorBottom        = true
  showHero                = true
  heroStyle               = "basic"   # Options: basic, big, background, thumbAndBackground
  layoutBackgroundBlur    = true
  layoutBackgroundHeaderSpace = false
  showBreadcrumbs         = true
  showDraftLabel          = true
  showEdit                = false
  # editURL               = "https://github.com/username/repo/"
  editAppendPath          = true
  seriesOpened            = false
  showHeadingAnchors      = true
  showPagination          = true
  invertPagination        = false
  showReadingTime         = true
  showTableOfContents     = true
  showRelatedContent      = true
  relatedContentLimit     = 3
  showTaxonomies          = true
  showAuthorsBadges       = false
  showWordCount           = true
  showZenMode             = false
  showComments            = true
  # sharingLinks = ["linkedin", "x-twitter", "reddit", "facebook", "email", "whatsapp", "telegram"]

# -------------------------
# List
# -------------------------
[list]
  showHero                  = true
  heroStyle                 = "background"   # Options: basic, big, background, thumbAndBackground
  layoutBackgroundBlur      = true
  layoutBackgroundHeaderSpace = true
  showBreadcrumbs           = false
  showSummary               = true
  showViews                 = false
  showLikes                 = false
  showTableOfContents       = false
  showCards                 = true
  groupByYear               = true
  cardView                  = true
  cardViewScreenWidth       = false
  constrainItemsWidth       = true

# -------------------------
# Sitemap
# -------------------------
[sitemap]
  excludedKinds = ["taxonomy", "term"]

# -------------------------
# Taxonomy
# -------------------------
[taxonomy]
  showTermCount         = true
  showHero              = false
  showBreadcrumbs       = false
  showViews             = false
  showLikes             = false
  showTableOfContents   = false
  cardView              = false

# -------------------------
# Term
# -------------------------
[term]
  showHero              = false
  heroStyle             = "background"
  showBreadcrumbs       = false
  showViews             = false
  showLikes             = false
  showTableOfContents   = true
  groupByYear           = false
  cardView              = false
  cardViewScreenWidth   = false

